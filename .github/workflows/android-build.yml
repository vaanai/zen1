name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build debug APK
      run: ./gradlew assembleDebug --console=plain

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zen-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error

    # Publish a "latest" GitHub Release with the APK attached, so it can be
    # downloaded directly on a phone (no login, no zip, no expiry) from:
    #   https://github.com/<owner>/<repo>/releases/latest
    #
    # The file name includes the run number so every build has a UNIQUE name.
    # This defeats the mobile-browser "this file was already downloaded ->
    # opens the old copy" trap: a new name can never collide with a cached one.
    # Just tap the highest-numbered zen-r*.apk on the release page.
    - name: Rename APK
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      run: cp app/build/outputs/apk/debug/app-debug.apk "zen-r${{ github.run_number }}.apk"

    # Delete the previous "latest" release (and its tag) so the release page always
    # offers exactly ONE apk — the newest. Without this, old zen-r*.apk assets pile
    # up on the same release and it's easy to tap a stale one.
    - name: Reset latest release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release delete latest --cleanup-tag -y || true

    - name: Publish to Release
      if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: Latest build
        body: "Latest Zen build (run #${{ github.run_number }}). Install the zen-r*.apk below directly on your phone."
        files: zen-r${{ github.run_number }}.apk
        make_latest: true
